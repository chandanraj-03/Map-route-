version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ai_route_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_route_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: ai_route_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_route
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - ./data:/data

  frontend:
    build: ./frontend
    container_name: ai_route_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
      - VITE_API_URL=http://localhost:8000

volumes:
  mongodb_data:
  redis_data:
